  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,94,0,0.3) transparent;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background-color: #060606;
      color: #fafafa;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body { overflow-x: clip; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,94,0,0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,94,0,0.5); }

    .noise-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ═══════════════════════════════════════════════════
       GRADIENT & TEXT
       ═══════════════════════════════════════════════════ */
    .gradient-text {
      background: linear-gradient(135deg, #ff5e00 0%, #ff8c42 50%, #ffb347 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .text-glow {
      text-shadow: 0 0 40px rgba(255, 94, 0, 0.3), 0 0 80px rgba(255, 94, 0, 0.1);
    }

    /* ═══════════════════════════════════════════════════
       CARD SYSTEM
       ═══════════════════════════════════════════════════ */
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 94, 0, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(255, 94, 0, 0.08);
      transform: translateY(-4px);
    }

    .card-static {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
    }

    .glass-surface {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* ═══════════════════════════════════════════════════
       GRID & BACKGROUNDS
       ═══════════════════════════════════════════════════ */
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .dot-grid {
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ═══════════════════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════════════════ */
    .btn-primary {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ff5e00, #ff8c42);
      color: #000;
      font-weight: 700;
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(255, 94, 0, 0.4), 0 8px 30px rgba(0, 0, 0, 0.3);
      transform: translateY(-2px);
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shimmer 3s infinite;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fafafa;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-ghost:hover {
      border-color: #ff5e00;
      color: #ff5e00;
      box-shadow: 0 0 20px rgba(255, 94, 0, 0.1);
    }

    /* ═══════════════════════════════════════════════════
       MARQUEE
       ═══════════════════════════════════════════════════ */
    .marquee-track { display: flex; width: max-content; }

    /* ═══════════════════════════════════════════════════
       SKILL BAR
       ═══════════════════════════════════════════════════ */
    .skill-bar-bg {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow: hidden;
    }
    .skill-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #ff5e00, #ff8c42);
      box-shadow: 0 0 16px rgba(255, 94, 0, 0.35);
    }

    /* ═══════════════════════════════════════════════════
       SCROLLBAR HIDE
       ═══════════════════════════════════════════════════ */
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }

    /* ═══════════════════════════════════════════════════
       SAFE AREAS & MOBILE
       ═══════════════════════════════════════════════════ */
    .safe-area-top { padding-top: env(safe-area-inset-top); }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* ═══════════════════════════════════════════════════
       ACCESSIBLE FOCUS
       ═══════════════════════════════════════════════════ */
    *:focus-visible {
      outline: 2px solid #ff5e00;
      outline-offset: 2px;
      border-radius: 4px;
    }

    ::selection {
      background: rgba(255, 94, 0, 0.25);
      color: #fafafa;
    }

    /* ═══════════════════════════════════════════════════
       HORIZONTAL SCROLL SECTION 
       ═══════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
